{% extends 'cars/base.html' %}
{% block title %}會員註冊{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h3 class="mb-4 text-center">📝 會員註冊</h3>
        <div class="card p-4 shadow-sm">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-success w-100">建立帳號</button>
            </form>
            <p class="text-center mt-3">已有帳號？<a href="{% url 'login' %}">立即登入</a></p>
        </div>
    </div>
</div>
{% endblock %}
