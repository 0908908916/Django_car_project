{% extends 'cars/base.html' %}
{% block title %}詢價 — {{ car }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3>📩 詢價 / 預約試乘</h3>
        <p class="text-muted">車款：<strong>{{ car }}</strong></p>
        <div class="card p-4 shadow-sm">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-danger w-100">送出詢價</button>
            </form>
        </div>
        <a href="{% url 'car_detail' car.pk %}" class="btn btn-link mt-2">← 返回車款頁</a>
    </div>
</div>
{% endblock %}
